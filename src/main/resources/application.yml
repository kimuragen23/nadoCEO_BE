server:
  port: 8080

spring:
  application:
    name: nadoceo-backend
  threads:
    virtual:
      enabled: true

  # --- DataSource ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nadoceo}
    username: ${DB_USERNAME:nadoceo}
    password: ${DB_PASSWORD:nadoceo}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Keycloak OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:30808/realms/nadoceo}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:30808/realms/nadoceo/protocol/openid-connect/certs}

  # --- Spring AI (OpenAI) ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          max-tokens: 4096
      embedding:
        options:
          model: text-embedding-3-small

# --- NADOCEO 커스텀 설정 ---
nadoceo:
  ai:
    provider: ${AI_PROVIDER:anthropic}
  coaching:
    max-socratic-turns: 2
    faq-similarity-threshold: 0.7

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
